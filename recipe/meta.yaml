{% set python_min = "3.10" %}
{% set name = "pynucastro" %}
{% set version = "2.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pynucastro-{{ version }}.tar.gz
  sha256: f4451f5079b9d12c6b460336aa3e315ef12eccec20ff9942fbd4a1ae657e8263

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - ipywidgets >=7.1.2
    - matplotlib-base >=2.1.0
    - networkx >=2.1
    - numpy >=1.13.3,<3.0
    - scipy >=1.0.0
    - sympy >=1.1.1
  run_constrained:
    - numba >=0.52

test:
  imports:
    - pynucastro
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pynucastro/pynucastro
  summary: A python library for nuclear astrophysics
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - zingale
    - yut23
